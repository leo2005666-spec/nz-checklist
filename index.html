<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
:root {
  --bg: #f5f5f0;
  --card: #ffffff;
  --text: #2d2d2d;
  --sub: #6b6b6b;
  --accent: #1a7a4c;
  --accent-light: #e8f5e9;
  --warn: #e67e22;
  --warn-light: #fef3e7;
  --danger: #c0392b;
  --danger-light: #fdedec;
  --blue: #2471a3;
  --blue-light: #eaf2f8;
  --border: #e0e0d8;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --radius: 10px;
  --transition: 0.15s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #1a3a2a 0%, #1a5c3a 40%, #1a7a4c 100%);
  color: #fff;
  padding: 28px 24px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}
.header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
.header h1 span { font-size: 1rem; font-weight: 400; opacity: 0.85; }
.countdown {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.12);
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 0.95rem;
}
.countdown strong { font-size: 1.3rem; font-weight: 700; }
.countdown small { opacity: 0.8; font-size: 0.8rem; }

/* ── Layout ── */
.app { max-width: 1100px; margin: 0 auto; padding: 20px 16px 40px; }

/* ── Dashboard ── */
.dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 12px;
  border-left: 4px solid transparent;
}
.stat-card.overall { border-left-color: var(--accent); }
.stat-card.buy-cn { border-left-color: var(--warn); }
.stat-card.ready  { border-left-color: #27ae60; }
.stat-card.info   { border-left-color: var(--blue); }
.stat-icon { font-size: 1.6rem; }
.stat-num { font-size: 1.8rem; font-weight: 700; line-height: 1; }
.stat-label { font-size: 0.8rem; color: var(--sub); margin-top: 2px; }
.stat-bar {
  height: 5px;
  border-radius: 3px;
  background: #e9ecef;
  margin-top: 6px;
  overflow: hidden;
}
.stat-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s ease;
}
.stat-bar-fill.green { background: #27ae60; }
.stat-bar-fill.orange { background: var(--warn); }

/* ── Filter Bar ── */
.filter-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.filter-btn {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--card);
  font-size: 0.85rem;
  cursor: pointer;
  transition: var(--transition);
  color: var(--text);
  font-family: inherit;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── Main Content ── */
.content-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 20px;
  align-items: start;
}

/* ── Sidebar ── */
.sidebar {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  position: sticky;
  top: 120px;
}
.sidebar-title {
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--sub);
  padding: 14px 16px 8px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  cursor: pointer;
  transition: var(--transition);
  font-size: 0.9rem;
  border-left: 3px solid transparent;
  text-decoration: none;
  color: var(--text);
}
.nav-item:hover { background: #f8f9fa; }
.nav-item.active { background: var(--accent-light); border-left-color: var(--accent); font-weight: 600; }
.nav-icon { font-size: 1.1rem; width: 24px; text-align: center; }
.nav-label { flex: 1; }
.nav-badge {
  font-size: 0.7rem;
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 600;
}
.nav-badge.cn { background: var(--warn-light); color: var(--warn); }
.nav-progress {
  width: 100%;
  height: 3px;
  background: #e9ecef;
  border-radius: 2px;
  overflow: hidden;
}
.nav-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

/* ── Category Section ── */
.category {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 16px;
  overflow: hidden;
}
.cat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}
.cat-header-left { display: flex; align-items: center; gap: 10px; }
.cat-icon { font-size: 1.4rem; }
.cat-title { font-size: 1.1rem; font-weight: 700; }
.cat-meta { font-size: 0.8rem; color: var(--sub); }
.cat-header-right { display: flex; align-items: center; gap: 10px; }
.cat-progress-text { font-size: 0.8rem; color: var(--sub); font-weight: 600; }
.cat-arrow { transition: transform 0.2s; font-size: 0.8rem; color: #999; }
.cat-header.collapsed .cat-arrow { transform: rotate(-90deg); }
.cat-body { padding: 8px 0; }
.cat-body.hidden { display: none; }

/* ── Item Row ── */
.item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  transition: background 0.12s;
  border-bottom: 1px solid #f5f5f0;
}
.item:last-child { border-bottom: none; }
.item:hover { background: #fafaf7; }
.item.checked .item-name { text-decoration: line-through; color: #aaa; }
.item.checked .item-note { opacity: 0.5; }

.item-checkbox {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 2px solid #cdd4da;
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  background: #fff;
}
.item-checkbox:hover { border-color: var(--accent); }
.item-checkbox.done { background: var(--accent); border-color: var(--accent); }
.item-checkbox.done::after {
  content: '✓';
  color: #fff;
  font-size: 0.75rem;
  font-weight: 700;
}

.item-content { flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.item-name { font-size: 0.9rem; font-weight: 500; }
.item-qty { font-size: 0.78rem; color: var(--sub); background: #f0f0eb; padding: 1px 7px; border-radius: 4px; white-space: nowrap; }
.item-note { font-size: 0.75rem; color: #999; }

/* ── Tags ── */
.tag {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
  white-space: nowrap;
  letter-spacing: 0.02em;
}
.tag-buy-cn { background: var(--warn-light); color: #c0681a; }
.tag-buy-nz { background: var(--blue-light); color: #1a5a8a; }
.tag-have   { background: #e8f5e9; color: #1a6b3a; }
.tag-important { background: var(--danger-light); color: var(--danger); }
.tag-optional { background: #f5f0ff; color: #6c5ce7; }

/* ── Info Box ── */
.info-box {
  background: #fffbf0;
  border: 1px solid #f0e4b8;
  border-radius: 8px;
  padding: 14px 18px;
  margin: 12px 20px;
  font-size: 0.85rem;
}
.info-box strong { color: var(--warn); }
.info-box.warn { background: #fff5f5; border-color: #f5c6cb; }
.info-box.warn strong { color: var(--danger); }

/* ── Buttons ── */
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; justify-content: center; }
.btn {
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: var(--transition);
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #15653e; }
.btn-outline { background: var(--card); color: var(--accent); border: 1.5px solid var(--accent); }
.btn-outline:hover { background: var(--accent-light); }
.btn-danger { background: #fff; color: var(--danger); border: 1.5px solid var(--danger); }
.btn-danger:hover { background: var(--danger-light); }

/* ── Print ── */
@media print {
  .header, .sidebar, .filter-bar, .btn-row, .stat-bar, .cat-arrow, .item-checkbox { display: none !important; }
  body { background: #fff; font-size: 12px; }
  .app { padding: 0; max-width: 100%; }
  .content-layout { display: block; }
  .category { break-inside: avoid; margin-bottom: 8px; box-shadow: none; border: 1px solid #ddd; }
  .cat-body.hidden { display: block !important; }
  .item { padding: 4px 12px; }
  .tag { border: 1px solid #ddd; }
  .tag-buy-cn { border-color: var(--warn); }
}

/* ── Mobile ── */
@media (max-width: 768px) {
  .content-layout { grid-template-columns: 1fr; }
  .sidebar { position: static; display: flex; flex-wrap: wrap; gap: 4px; padding: 8px; }
  .sidebar-title { display: none; }
  .nav-item { padding: 8px 12px; border-left: none; border-radius: 8px; font-size: 0.8rem; }
  .nav-item.active { border-left: none; }
  .nav-progress, .nav-badge { display: none; }
  .header h1 { font-size: 1.2rem; }
  .dashboard { grid-template-columns: repeat(2, 1fr); }
  .stat-card { padding: 12px; }
  .stat-num { font-size: 1.4rem; }
  .cat-title { font-size: 1rem; }
  .item { padding: 8px 12px; gap: 6px; }
  .item-name { font-size: 0.82rem; }
}

/* empty state for filtered sections */
.empty-hint {
  text-align: center;
  padding: 24px;
  color: #aaa;
  font-size: 0.85rem;
}
</style>
</head>

// ═══════════ STATE ═══════════
const STORAGE_KEY = 'nz-checklist-state';
let checkState = {};   // { 'item-index': true/false }
let currentFilter = 'all';
let collapsedCats = {};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) checkState = JSON.parse(raw);
  } catch(e) { checkState = {}; }
  try {
    const raw2 = localStorage.getItem(STORAGE_KEY + '-collapsed');
    if (raw2) collapsedCats = JSON.parse(raw2);
  } catch(e) { collapsedCats = {}; }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(checkState));
  localStorage.setItem(STORAGE_KEY + '-collapsed', JSON.stringify(collapsedCats));
}

function getItemKey(catIdx, itemIdx) { return `${catIdx}-${itemIdx}`; }

// ═══════════ RENDER ═══════════
function getFlatItems() {
  const flat = [];
  categories.forEach((cat, ci) => {
    cat.items.forEach((item, ii) => {
      flat.push({ cat, ci, ii, item, key: getItemKey(ci, ii), done: !!checkState[getItemKey(ci, ii)] });
    });
  });
  return flat;
}

function renderAll() {
  renderSidebar();
  renderContent();
  updateStats();
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<div class="sidebar-title">分类导航</div>';
  categories.forEach((cat, ci) => {
    const flat = cat.items.map((item, ii) => ({ key: getItemKey(ci, ii), done: !!checkState[getItemKey(ci, ii)], item }));
    const done = flat.filter(f => f.done).length;
    const total = flat.length;
    const pct = total ? Math.round(done/total*100) : 0;
    const cnCount = cat.items.filter(i => i.tag === 'buy-cn').length;
    html += `
      <a class="nav-item" href="#cat-${cat.id}" onclick="scrollToCat('${cat.id}')">
        <span class="nav-icon">${cat.icon}</span>
        <span class="nav-label">${cat.title}</span>
        ${cnCount ? `<span class="nav-badge cn">${cnCount}购</span>` : ''}
        <span style="font-size:0.75rem;color:var(--sub)">${done}/${total}</span>
      </a>`;
  });
  sb.innerHTML = html;
}

function renderContent() {
  const main = document.getElementById('main-content');
  let html = '';
  categories.forEach((cat, ci) => {
    const allItems = cat.items.map((item, ii) => ({
      item, key: getItemKey(ci, ii), done: !!checkState[getItemKey(ci, ii)]
    }));

    let visibleItems = allItems;
    if (currentFilter === 'unchecked') {
      visibleItems = allItems.filter(f => !f.done);
    } else if (currentFilter === 'buy-cn') {
      visibleItems = allItems.filter(f => f.item.tag === 'buy-cn');
    } else if (currentFilter === 'important') {
      visibleItems = allItems.filter(f => f.item.important);
    }

    const doneCount = allItems.filter(f => f.done).length;
    const total = allItems.length;
    const pct = total ? Math.round(doneCount/total*100) : 0;
    const collapsed = !!collapsedCats[cat.id];

    html += `
    <section class="category" id="cat-${cat.id}">
      <div class="cat-header${collapsed ? ' collapsed' : ''}" onclick="toggleCat('${cat.id}')">
        <div class="cat-header-left">
          <span class="cat-icon">${cat.icon}</span>
          <div>
            <div class="cat-title">${cat.title}</div>
            <div class="cat-meta">${cat.desc}</div>
          </div>
        </div>
        <div class="cat-header-right">
          <div class="cat-progress-text">${doneCount}/${total} · ${pct}%</div>
          <span class="cat-arrow">▼</span>
        </div>
      </div>
      <div class="cat-body${collapsed ? ' hidden' : ''}">
        ${cat.id === 'medicine' ? `
        <div class="info-box warn">
          <strong>⚠️ 药品入境重要提醒：</strong>所有药品必须保留<strong>原包装+说明书</strong>，不拆散不带无标签药片。
          不带含<strong>伪麻黄碱、麻黄碱、可待因</strong>成分的药（重点检查感冒药、止咳药、鼻炎药）。
          处方药带<strong>医生处方和英文说明</strong>。入境时主动申报个人自用。
        </div>` : ''}
        ${cat.id === 'electronics' ? `
        <div class="info-box">
          <strong>💡 提示：</strong>新西兰使用澳标插座（八字形三孔），电压230V。国内两脚插头可以直接用转换插头转接。
          转换插头一定要在国内买好，新西兰买又贵又难找。推荐买<strong>公牛等品牌的澳标转换插头</strong>。
        </div>` : ''}
        ${cat.id === 'pre-flight' ? `
        <div class="info-box warn">
          <strong>⚠️ 新西兰生物安全非常严格！</strong>出发前务必清洁所有鞋底、行李箱轮子，刷掉泥土、草籽、砂石。
          不带食品（肉、蛋、奶、水果、种子、蜂蜜）。不确定就申报，宁愿多申报不要漏报。
          充电宝、锂电池必须随身，不放托运！
        </div>` : ''}
        ${visibleItems.length === 0 ? '<div class="empty-hint">✅ 此分类已全部完成或没有匹配项</div>' : ''}
        ${visibleItems.map(f => renderItem(f.item, f.key, f.done, ci)).join('')}
      </div>
    </section>`;
  });
  main.innerHTML = html;
}

function renderItem(item, key, done) {
  const tagMap = {
    'buy-cn': '<span class="tag tag-buy-cn">🛒 国内购买</span>',
    'buy-nz': '<span class="tag tag-buy-nz">🇳🇿 新西兰买</span>',
    'have': '<span class="tag tag-have">✅ 已有</span>',
  };
  const tagHtml = tagMap[item.tag] || '';
  const importantHtml = item.important ? '<span class="tag tag-important">⚠️ 重要</span>' : '';
  const noteHtml = item.note ? `<span class="item-note">${item.note}</span>` : '';

  return `
    <div class="item${done ? ' checked' : ''}" data-key="${key}">
      <div class="item-checkbox${done ? ' done' : ''}" onclick="toggleItem('${key}')"></div>
      <div class="item-content">
        <span class="item-name">${item.name}</span>
        ${item.qty ? `<span class="item-qty">${item.qty}</span>` : ''}
        ${importantHtml}
        ${tagHtml}
        ${noteHtml}
      </div>
    </div>`;
}

function toggleItem(key) {
  checkState[key] = !checkState[key];
  saveState();
  renderAll();
}

function toggleCat(catId) {
  collapsedCats[catId] = !collapsedCats[catId];
  saveState();
  // Just toggle the body visibility directly to avoid full re-render
  const cat = document.getElementById('cat-' + catId);
  if (cat) {
    const header = cat.querySelector('.cat-header');
    const body = cat.querySelector('.cat-body');
    if (collapsedCats[catId]) {
      header.classList.add('collapsed');
      body.classList.add('hidden');
    } else {
      header.classList.remove('collapsed');
      body.classList.remove('hidden');
    }
  }
}

function scrollToCat(catId) {
  const el = document.getElementById('cat-' + catId);
  if (el) {
    if (collapsedCats[catId]) {
      collapsedCats[catId] = false;
      saveState();
      renderAll();
    }
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function updateStats() {
  const flat = getFlatItems();
  const total = flat.length;
  const done = flat.filter(f => f.done).length;
  const pct = total ? Math.round(done/total*100) : 0;

  const cnItems = flat.filter(f => f.item.tag === 'buy-cn');
  const cnDone = cnItems.filter(f => f.done).length;
  const cnTotal = cnItems.length;
  const cnPct = cnTotal ? Math.round(cnDone/cnTotal*100) : 0;

  document.getElementById('stat-overall').textContent = pct + '%';
  document.getElementById('stat-cn').textContent = (cnTotal - cnDone) + ' 项';
  document.getElementById('stat-ready').textContent = done + ' 项';
  document.getElementById('bar-overall').style.width = pct + '%';
  document.getElementById('bar-cn').style.width = cnPct + '%';

  // Countdown
  const now = new Date();
  const target = new Date('2026-07-09T00:00:00+08:00');
  const diff = Math.ceil((target - now) / (1000*60*60*24));
  document.getElementById('countdown-days').textContent = Math.max(0, diff);
  document.getElementById('stat-remaining').textContent = Math.max(0, diff) + ' 天';
}

// ═══════════ FILTER ═══════════
document.querySelector('.filter-bar').addEventListener('click', (e) => {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = e.target.dataset.filter;
    renderContent();
  }
});

// ═══════════ ACTIONS ═══════════
function resetAll() {
  if (confirm('确定要清除所有勾选进度吗？此操作不可恢复。')) {
    checkState = {};
    collapsedCats = {};
    saveState();
    renderAll();
  }
}

function exportSummary() {
  const flat = getFlatItems();
  const unchecked = flat.filter(f => !f.done);
  const uncheckedCN = unchecked.filter(f => f.item.tag === 'buy-cn');
  const uncheckedImportant = unchecked.filter(f => f.item.important);

  let text = '══════════════════════════\n';
  text += '🥝 新西兰行前准备 - 待办摘要\n';
  text += '生成时间：' + new Date().toLocaleString('zh-CN') + '\n';
  text += '══════════════════════════\n\n';

  text += `📊 总进度：${Math.round(flat.filter(f=>f.done).length/flat.length*100)}%（${flat.filter(f=>f.done).length}/${flat.length}）\n`;
  text += `🛒 国内待购：${uncheckedCN.length} 项\n`;
  text += `⚠️ 重要待办：${uncheckedImportant.length} 项\n\n`;

  text += '── 🛒 国内还需购买 ──\n';
  if (uncheckedCN.length === 0) {
    text += '  ✅ 全部买齐了！\n';
  } else {
    uncheckedCN.forEach(f => {
      text += `  ☐ ${f.item.name}${f.item.qty ? ' ×'+f.item.qty : ''}${f.item.important ? ' ⚠️' : ''}\n`;
      if (f.item.note) text += `    └ ${f.item.note}\n`;
    });
  }

  text += '\n── ⚠️ 重要项待办 ──\n';
  if (uncheckedImportant.length === 0) {
    text += '  ✅ 全部完成了！\n';
  } else {
    uncheckedImportant.forEach(f => {
      text += `  ☐ [${f.cat.title}] ${f.item.name}\n`;
    });
  }

  text += '\n── 📋 全部待办 ──\n';
  const byCat = {};
  unchecked.forEach(f => {
    if (!byCat[f.cat.title]) byCat[f.cat.title] = [];
    byCat[f.cat.title].push(f);
  });
  for (const [cat, items] of Object.entries(byCat)) {
    text += `\n  【${cat}】${items.length}项\n`;
    items.forEach(f => {
      text += `    ☐ ${f.item.name}${f.item.qty ? ' ×'+f.item.qty : ''} [${f.item.tag === 'buy-cn' ? '国内买' : f.item.tag === 'buy-nz' ? '新西兰买' : '已有'}]\n`;
    });
  }

  const box = document.getElementById('summary-box');
  box.innerHTML = `<div class="category"><div class="cat-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
    <div class="cat-header-left"><span>📋</span><div><div class="cat-title">文字摘要</div><div class="cat-meta">点击展开/收起 · 可复制粘贴发给父母</div></div></div>
    <span class="cat-arrow">▼</span></div>
    <pre class="cat-body" style="padding:16px;font-size:0.8rem;line-height:1.6;white-space:pre-wrap;font-family:inherit;background:#fafaf7;margin:0;">${text}</pre></div>`;
  box.scrollIntoView({ behavior: 'smooth' });
}

// ═══════════ INIT ═══════════
loadState();
renderAll();

// Update countdown every hour
setInterval(updateStats, 3600000);
</script>
</body>
</html>
